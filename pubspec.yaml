name: doxa_prayer_mobile_app
description: "Doxa prayer mobile app — pray for unreached people groups."
# The following line prevents the package from being accidentally published to
# pub.dev using `flutter pub publish`. This is preferred for private packages.
publish_to: 'none' # Remove this line if you wish to publish to pub.dev

# The following defines the version and build number for your application.
# A version number is three numbers separated by dots, like 1.2.43
# followed by an optional build number separated by a +.
# Both the version and the builder number may be overridden in flutter
# build by specifying --build-name and --build-number, respectively.
# In Android, build-name is used as versionName while build-number used as versionCode.
# Read more about Android versioning at https://developer.android.com/studio/publish/versioning
# In iOS, build-name is used as CFBundleShortVersionString while build-number is used as CFBundleVersion.
# Read more about iOS versioning at
# https://developer.apple.com/library/archive/documentation/General/Reference/InfoPlistKeyReference/Articles/CoreFoundationKeys.html
# In Windows, build-name is used as the major, minor, and patch parts
# of the product and file versions while build-number is used as the build suffix.
version: 1.10.0+17

environment:
  sdk: ^3.11.5

# Dependencies specify other packages that your package needs in order to work.
# To automatically upgrade your package dependencies to the latest versions
# consider running `flutter pub upgrade --major-versions`. Alternatively,
# dependencies can be manually updated by changing the version numbers below to
# the latest version available on pub.dev. To see which dependencies have newer
# versions available, run `flutter pub outdated`.
dependencies:
  flutter:
    sdk: flutter

  # The following adds the Cupertino Icons font to your application.
  # Use with the CupertinoIcons class for iOS style icons.
  cupertino_icons: ^1.0.8
  flutter_svg: ^2.0.10+1
  http: ^1.2.0
  go_router: ^14.0.0
  shared_preferences: ^2.3.0
  flutter_local_notifications: ^22.0.1
  timezone: ^0.11.0
  flutter_timezone: ^5.1.0
  flutter_localizations:
    sdk: flutter
  intl: any
  url_launcher: ^6.3.1
  app_settings: ^6.1.1
  flutter_dotenv: ^5.1.0
  android_play_install_referrer: ^0.4.0
  package_info_plus: ^10.1.0
  in_app_update: ^4.2.5
  # Kept in dependencies (not dev_dependencies) because it declares a native
  # Android plugin (FlutterNativeSplashPlugin) that GeneratedPluginRegistrant
  # references. Flutter strips dev_dependency native code from release builds,
  # which would otherwise break release compilation with "package ... does not
  # exist". It is still used only as a CLI generator (`dart run
  # flutter_native_splash:create`); no runtime API is called.
  flutter_native_splash: ^2.4.7
  share_plus: ^13.1.0
  qr_flutter: ^4.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter

  # The "flutter_lints" package below contains a set of recommended lints to
  # encourage good coding practices. The lint set provided by the package is
  # activated in the `analysis_options.yaml` file located at the root of your
  # package. See that file for information about deactivating specific lint
  # rules and activating additional ones.
  flutter_lints: ^6.0.0
  shared_preferences_platform_interface: ^2.4.2
  flutter_flavorizr: ^2.5.0
  flutter_launcher_icons: ^0.14.4

# iOS app icon generation. Android icons are maintained by hand (adaptive
# foreground/background PNGs under android/.../res/mipmap-*), so we only generate
# iOS icons. This is a flavorizr project: the Xcode configs reference
# AppIcon-$(ASSET_PREFIX), so icons are defined per-flavor in
# flutter_launcher_icons-staging.yaml / -production.yaml (which produce the
# AppIcon-staging / AppIcon-production sets). Do NOT add a top-level
# `flutter_launcher_icons:` block here — its non-flavor run rewrites every build
# config's APPICON name to plain "AppIcon" and corrupts the asset-symbol setting.
# Regenerate with: dart run flutter_launcher_icons
# Source is a padded, white-flattened 1024x1024 (iOS icons must have no alpha).

flutter_native_splash:
  # iOS only — the Android splash is maintained by hand (solid green #3B463D
  # background + the adaptive launcher icon, see android/.../res/values*/styles.xml).
  # This mirrors that look on iOS: green background with the DOXA logo in a white
  # circle. Run: dart run flutter_native_splash:create
  android: false
  ios: true
  color: "#3B463D"
  color_dark: "#3B463D"
  image: assets/images/splash_logo.png

# Flavor definitions consumed by flutter_flavorizr. Only the iOS processors are
# run from this config (`dart run flutter_flavorizr -p ios:...`); the Android
# flavors are defined by hand in android/app/build.gradle.kts because flavorizr's
# Android processor targets Groovy build.gradle, not the Kotlin DSL used here.
flavorizr:
  flavors:
    production:
      app:
        name: "Doxa Prayer"
      android:
        applicationId: "app.prayer.doxa"
      ios:
        bundleId: "app.prayer.doxa"
    staging:
      app:
        name: "Doxa Staging"
      android:
        applicationId: "app.prayer.doxa.staging"
      ios:
        bundleId: "app.prayer.doxa.staging"

# For information on the generic Dart part of this file, see the
# following page: https://dart.dev/tools/pub/pubspec


# The following section is specific to Flutter packages.
flutter:

  # In order to generate the app_localizations.dart file, we need to add the following line
  generate: true
  uses-material-design: true

  assets:
    - assets/icons/
    - assets/images/
    - .env

  fonts:
    - family: BebasKai
      fonts:
        - asset: assets/fonts/BebasKai/BebasKai.ttf
          weight: 400
    - family: Poppins
      fonts:
        - asset: assets/fonts/Poppins/Poppins-Regular.ttf
          weight: 400
        - asset: assets/fonts/Poppins/Poppins-Medium.ttf
          weight: 500
    - family: BrandonGrotesque
      fonts:
        - asset: assets/fonts/Brandon_Grotesque/Brandon_Grotesque_bold.otf
          weight: 600
